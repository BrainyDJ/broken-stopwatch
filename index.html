<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>broken stopwatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="realTime" class="real-time">00:00:00.0</div>
  <div class="stopwatch">
    <div class="display">
      <img class="neg-sign" id="negSign" src="Assets/Symbol - Negative.png" alt="-" hidden>
      <img class="digit" id="h1" src="Assets/Number - 0.png" alt="0">
      <img class="digit" id="h2" src="Assets/Number - 0.png" alt="0">
      <span class="sep">:</span>
      <img class="digit" id="m1" src="Assets/Number - 0.png" alt="0">
      <img class="digit" id="m2" src="Assets/Number - 0.png" alt="0">
      <span class="sep">:</span>
      <img class="digit" id="s1" src="Assets/Number - 0.png" alt="0">
      <img class="digit" id="s2" src="Assets/Number - 0.png" alt="0">
      <img class="dec-sep" src="Assets/Symbol - Period.png" alt=".">
      <img class="digit" id="s3" src="Assets/Number - 0.png" alt="0">
    </div>
    <div class="controls">
      <img class="btn" id="startBtn" src="Assets/Button - Start.png" alt="Start">
      <img class="btn-sep" src="Assets/Symbol - Semicolon.png" alt=";">
      <img class="btn" id="stopBtn"  src="Assets/Button - Stop.png"  alt="Stop">
      <img class="btn-sep" src="Assets/Symbol - Semicolon.png" alt=";">
      <img class="btn" id="resetBtn" src="Assets/Button - Reset.png" alt="Reset">
    </div>
  </div>
  <img class="vibe-coded" src="Assets/vibe coded.png" alt="vibe coded">
  <script src="script.js"></script>
</body>
</html>
